name: CD Pipeline

on:
  push:
    branches: [main] # Trigger the workflow on push to the main branch

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to Docker Hub using secrets for security
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build the Docker image from the current directory
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/biovue_backend:latest .

      # Push the built image to the Docker Hub registry
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/biovue_backend:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push # Ensures deployment only happens after a successful build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Connect to the remote server via SSH and deploy the new image
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /root/backend/app
            # Stop currently running containers and remove orphans (containers not defined in the compose file)
            # This ensures we start with a clean state and avoid conflicts with old containers.
            docker compose down --remove-orphans

            # Force remove stopped service containers
            docker compose rm -f

            # Pull the latest Docker images defined in the compose file (e.g., the new application image)
            docker compose pull

            # Start the services in detached mode (background) using the updated images
            docker compose up -d

            # Remove unused "dangling" images to free up disk space on the server
            docker image prune -f
